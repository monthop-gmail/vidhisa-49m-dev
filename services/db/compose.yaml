services:
  vidhisa-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vidhisa49m}
      POSTGRES_USER: ${POSTGRES_USER:-vidhisa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - vidhisa_db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidhisa} -d ${POSTGRES_DB:-vidhisa49m}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vidhisa-net

volumes:
  vidhisa_db_data:
