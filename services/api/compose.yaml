services:
  vidhisa-api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vidhisa}:${POSTGRES_PASSWORD:-changeme}@vidhisa-db:5432/${POSTGRES_DB:-vidhisa49m}
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    depends_on:
      vidhisa-db:
        condition: service_healthy
    networks:
      - vidhisa-net
