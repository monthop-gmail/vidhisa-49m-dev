server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — no cache (ข้อมูลต้อง real-time เสมอ)
    location /api/ {
        proxy_pass http://vidhisa-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # ห้าม cache ทุกระดับ
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Static files — HTML ห้าม cache, JS/CSS cache สั้น
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    location ~* \.(html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # GeoJSON + images — cache ได้นาน (ไม่ค่อยเปลี่ยน)
    location ~* \.(geojson|png|jpg|ico|svg)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
