<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — วิทิสา 49M</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.login-box { max-width:400px; margin:2rem auto; }
.login-box input { width:100%; padding:0.5rem; font-size:1rem; margin-top:0.3rem; border:1px solid #ccc; border-radius:4px; }
.login-box label { font-size:0.9rem; display:block; margin-top:0.8rem; }
.login-box button { width:100%; padding:0.7rem; font-size:1.1rem; margin-top:1rem; }
.msg { padding:0.5rem; border-radius:4px; margin-top:0.5rem; font-size:0.9rem; }
.msg-err { background:#ffebee; color:#c62828; }
</style>
</head>
<body>

<header>
    <h1>วิทิสา 49 ล้านนาที</h1>
    <p>ระบบบันทึกและประมวลผลการปฏิบัติสมาธิวิทิสา</p>
</header>

<main>
    <section class="login-box">
        <h2>เข้าสู่ระบบ</h2>
        <label>Username
            <input id="username" type="text" placeholder="username" autofocus>
        </label>
        <label>Password
            <input id="password" type="password" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
        </label>
        <button class="btn-approve" onclick="doLogin()">เข้าสู่ระบบ</button>
        <div id="msg"></div>
    </section>
</main>

<script>
async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) return showErr('กรุณากรอก username และ password');

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password}),
        });
        const data = await res.json();
        if (!res.ok) return showErr(data.detail?.message || 'Login ไม่สำเร็จ');

        // Save token + user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Set cookie for page loads
        document.cookie = `token=${data.token}; path=/; max-age=${24*3600}`;

        // Redirect based on role
        if (data.user.role === 'central_admin') {
            window.location.href = '/admin.html';
        } else {
            window.location.href = `/admin.html?branch=${data.user.branch_id}`;
        }
    } catch (e) {
        showErr('เกิดข้อผิดพลาด');
    }
}

function showErr(text) {
    document.getElementById('msg').innerHTML = `<div class="msg msg-err">${text}</div>`;
}

// If already logged in, redirect
const token = localStorage.getItem('token');
if (token) {
    fetch('/api/auth/me', {headers: {'Authorization': `Bearer ${token}`}})
        .then(r => { if (r.ok) return r.json(); throw 'expired'; })
        .then(user => {
            if (user.role === 'central_admin') window.location.href = '/admin.html';
            else window.location.href = `/admin.html?branch=${user.branch_id}`;
        })
        .catch(() => { localStorage.removeItem('token'); localStorage.removeItem('user'); });
}
</script>
</body>
</html>
