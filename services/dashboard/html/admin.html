<!DOCTYPE html>
<html lang="th">
<head>

<body>

<header>

<main>

        <label for="branch-select">เลือกสาขา:</label>
        <select id="branch-select" onchange="loadPending()">

    <section>

                    <th>ID</th><th>ประเภท</th><th>ชื่อ</th><th>นาที</th><th>วันที่</th><th>Flags</th><th>จัดการ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="pending-empty" style="display:none">ไม่มีรายการรออนุมัติ</p>
    </section>
</main>

<script src="/js/admin.js"></script>
