<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สาขา Admin — วิทิสา 49M</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <h1>สาขา Admin</h1>
    <p><a href="/">← กลับ Dashboard</a></p>
</header>

<main>
    <section>
        <label for="branch-select">เลือกสาขา:</label>
        <select id="branch-select" onchange="loadPending()">
            <option value="">-- เลือก --</option>
        </select>
    </section>

    <section>
        <h2>รายการรออนุมัติ</h2>
        <table id="pending-table">
            <thead>
                <tr>
                    <th>ID</th><th>ประเภท</th><th>ชื่อ</th><th>นาที</th><th>วันที่</th><th>Flags</th><th>จัดการ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="pending-empty" style="display:none">ไม่มีรายการรออนุมัติ</p>
    </section>

    <section>
        <h2>องค์กร</h2>
        <div style="margin-bottom:0.5rem; display:flex; gap:0.5rem; align-items:center;">
            <a href="/api/organizations/export" class="btn-approve" style="text-decoration:none; display:inline-block;">Export CSV</a>
            <label class="btn-approve" style="cursor:pointer; display:inline-block;">
                Import CSV
                <input type="file" id="import-file" accept=".csv" style="display:none" onchange="importOrgs(this)">
            </label>
            <span id="import-status" style="font-size:0.85rem; color:#666;"></span>
        </div>
        <table id="org-table">
            <thead>
                <tr>
                    <th>รหัส</th><th>ชื่อ</th><th>ประเภท</th><th>จังหวัด</th><th>สาขา</th><th>นาที</th><th>รายการ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3 style="margin-top:1rem">เพิ่มองค์กร</h3>
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:0.5rem; margin-top:0.5rem;">
            <div><label>รหัส</label><input id="org-id" placeholder="ORG016" style="width:100%"></div>
            <div><label>ชื่อ</label><input id="org-name" placeholder="ชื่อองค์กร" style="width:100%"></div>
            <div><label>ประเภท</label><select id="org-type" style="width:100%">
                <option value="">-- เลือก --</option>
                <option value="สถาบันพลังจิตตานุภาพ">สถาบันพลังจิตตานุภาพ</option>
                <option value="โรงเรียน">โรงเรียน</option>
                <option value="มหาวิทยาลัย">มหาวิทยาลัย</option>
                <option value="วัด">วัด</option>
                <option value="หน่วยงาน">หน่วยงาน</option>
                <option value="ชุมชน">ชุมชน</option>
            </select></div>
            <div><label>สาขา</label><select id="org-branch" style="width:100%"></select></div>
            <div><label>จังหวัด</label><input id="org-province" placeholder="จังหวัด" style="width:100%"></div>
            <div><label>ละติจูด</label><input id="org-lat" type="number" step="any" style="width:100%"></div>
            <div><label>ลองจิจูด</label><input id="org-lng" type="number" step="any" style="width:100%"></div>
            <div><label>ติดต่อ</label><input id="org-contact" placeholder="เบอร์โทร/LINE" style="width:100%"></div>
        </div>
        <button class="btn-approve" style="margin-top:0.5rem" onclick="createOrg()">เพิ่มองค์กร</button>
    </section>
</main>

<script src="/js/admin.js"></script>
</body>
</html>
