name: One-off — get API logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            cd /root/vidhisa-49m-dev
            docker compose logs vidhisa-api --tail=200 2>&1 | grep -A30 -B2 "Traceback\|Error\|sqlalchemy" | tail -100
