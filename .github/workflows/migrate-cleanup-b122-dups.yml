name: One-off — cleanup B122 duplicate participants

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e
            cd /root/vidhisa-49m-dev
            docker compose exec -T vidhisa-db psql -U vidhisa -d vidhisa49m -v ON_ERROR_STOP=1 <<'SQL'
            BEGIN;
            -- ตรวจสอบไม่มี records ก่อนลบ (safety check)
            DO $$
            DECLARE
              cnt INT;
            BEGIN
              SELECT COUNT(*) INTO cnt FROM records WHERE participant_id IN (469, 474, 471, 470, 468, 473);
              IF cnt > 0 THEN
                RAISE EXCEPTION 'ABORT: % records ผูกกับ duplicate participants', cnt;
              END IF;
            END $$;
            DELETE FROM participants WHERE id IN (469, 474, 471, 470, 468, 473);
            SELECT id, first_name, last_name, member_code FROM participants
              WHERE first_name IN ('ณัฐชาภรณ์','ภรดี','สุนิสา','รัตนะ','สุธน','ธนรัฐ')
              AND branch_id = 'B122'
              ORDER BY first_name;
            COMMIT;
            SQL
