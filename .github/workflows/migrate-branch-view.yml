name: One-off — apply branch-view migration on GCP

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e
            cd /root/vidhisa-49m-dev
            docker compose exec -T vidhisa-db psql -U vidhisa -d vidhisa49m -v ON_ERROR_STOP=1 < services/db/init/04-branch-view.sql
            echo "--- verify ---"
            docker compose exec -T vidhisa-db psql -U vidhisa -d vidhisa49m -c "SELECT count(*) total, count(view_secret) with_secret FROM branches;"
            echo "--- restart api to pick up new schema ---"
            docker compose restart vidhisa-api
