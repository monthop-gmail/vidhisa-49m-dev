name: Deploy to GCP VM

# ยังไม่ใช้งาน — กด Run manually เมื่อพร้อม
# ต้องตั้ง secrets ใน GitHub repo ก่อน:
#   - GCP_VM_HOST (IP ของ VM จาก OpenTofu output)
#   - GCP_VM_USER (เช่น ubuntu)
#   - GCP_VM_SSH_KEY (SSH private key สำหรับเข้า VM)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          pip install -r services/api/requirements-test.txt
          cd services/api
          python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to VM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            cd ~/vidhisa-49m-dev || {
              git clone https://github.com/monthop-gmail/vidhisa-49m-dev.git ~/vidhisa-49m-dev
              cd ~/vidhisa-49m-dev
              cp .env.example .env
              echo "⚠️ อย่าลืมแก้ POSTGRES_PASSWORD ใน .env"
            }

            echo "=== Git Pull ==="
            git pull origin main

            echo "=== Rebuild & Restart ==="
            docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d --build --remove-orphans

            echo "=== Health Check ==="
            sleep 5
            curl -sf http://localhost:8000/api/health && echo " ✅ API OK" || echo " ❌ API FAILED"
            curl -sf -o /dev/null -w "Dashboard: %{http_code}" http://localhost:8080 && echo " ✅" || echo " ❌"

            echo "=== Services ==="
            docker compose ps
