name: One-off — apply multi-branch admin migration on GCP

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e
            cd /root/vidhisa-49m-dev
            docker compose exec -T vidhisa-db psql -U vidhisa -d vidhisa49m -v ON_ERROR_STOP=1 < services/db/init/06-multi-branch-admin.sql
            echo "--- verify ---"
            docker compose exec -T vidhisa-db psql -U vidhisa -d vidhisa49m -c "SELECT count(*) total, count(*) FILTER (WHERE jsonb_array_length(branch_ids) > 0) with_ids FROM users;"
            echo "--- restart api ---"
            docker compose restart vidhisa-api
