name: Rebuild DB on GCP VM

# กดรัน manual — ลบ DB เก่า สร้าง schema + seed ใหม่
# ⚠️ Records/Participants/Organizations ถูกลบ แต่ GGS URLs จะถูก backup/restore อัตโนมัติ

on:
  workflow_dispatch:

jobs:
  rebuild:
    name: Rebuild DB
    runs-on: ubuntu-latest
    steps:
      - name: SSH and rebuild DB
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            cd /root/vidhisa-49m-dev
            git pull origin main

            echo "=== Backup GGS URLs ==="
            TOKEN=$(curl -sf -X POST http://localhost:8000/api/auth/login -H 'Content-Type: application/json' -d '{"username":"admin","password":"vidhisa2569"}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" || echo "")
            if [ -n "$TOKEN" ]; then
              curl -sf http://localhost:8000/api/ggs/sources > /tmp/ggs-urls-backup.json
              COUNT=$(python3 -c "import json; print(len([b for b in json.load(open('/tmp/ggs-urls-backup.json')) if b.get('ggs_url_org') or b.get('ggs_url_participant') or b.get('ggs_url_record_bulk') or b.get('ggs_url_record_ind')]))")
              echo "Backed up $COUNT branches with URLs"
            else
              echo "⚠️ Cannot login — no backup"
              echo "[]" > /tmp/ggs-urls-backup.json
            fi

            echo "=== Rebuild DB ==="
            make rebuild-db
            sleep 10

            echo "=== Health Check ==="
            curl -sf http://localhost:8000/api/healthz && echo " ✅ API OK" || echo " ❌ API FAILED"

            echo "=== Restore GGS URLs ==="
            TOKEN=$(curl -sf -X POST http://localhost:8000/api/auth/login -H 'Content-Type: application/json' -d '{"username":"admin","password":"vidhisa2569"}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" || echo "")
            if [ -n "$TOKEN" ] && [ -s /tmp/ggs-urls-backup.json ]; then
              python3 /root/vidhisa-49m-dev/scripts/restore-ggs-urls.py "$TOKEN" /tmp/ggs-urls-backup.json || echo "⚠️ Restore failed"
            else
              echo "⚠️ No backup to restore"
            fi
